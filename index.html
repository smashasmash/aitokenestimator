<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAUE W3</title>
    <style>
      body { margin: 0; }
      #password-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: Arial, sans-serif;
      }
      .password-box {
        background: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
      }
      .password-box h1 { color: #333; margin-top: 0; }
      .password-box input {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 4px;
        width: 250px;
        margin: 10px 0;
      }
      .password-box button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      .password-box button:hover { background: #764ba2; }
      .password-box .error { color: red; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div id="password-container">
      <div class="password-box">
        <h1>🔒 Protected Site</h1>
        <p>Enter password to continue:</p>
        <input type="password" id="passwordInput" placeholder="Password" />
        <button onclick="checkPassword()">Enter</button>
        <button onclick="logout()" style="background: #999; margin-left: 5px;">Logout</button>
        <div id="error" class="error"></div>
      </div>
    </div>

    <div id="root" style="display: none;"></div>

    <script>
      const CORRECT_PASSWORD = "gyghiC-fytbyz-1cipdy";

      // Check if already authenticated
      window.addEventListener("load", () => {
        if (localStorage.getItem("authenticated") === "true") {
          showApp();
        }
      });

      function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input === CORRECT_PASSWORD) {
          localStorage.setItem("authenticated", "true");
          showApp();
        } else {
          document.getElementById("error").textContent = "❌ Incorrect password";
        }
      }

      function showApp() {
        document.getElementById("password-container").style.display = "none";
        document.getElementById("root").style.display = "block";
        const script = document.createElement("script");
        script.type = "module";
        script.src = "/src/main.tsx";
        document.head.appendChild(script);
      }

      function logout() {
        localStorage.removeItem("authenticated");
        location.reload();
      }

      // Allow Enter key
      document.getElementById("passwordInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") checkPassword();
      });
    </script>
  </body>
</html>
