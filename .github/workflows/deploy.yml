name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - v3-calculations-ui
      - v3-design-session-0217
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Encrypt with Staticrypt
        if: ${{ secrets.SITE_PASSWORD != '' }}
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: npx staticrypt dist/index.html "$SITE_PASSWORD" -o dist/index.html --remember 7
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
